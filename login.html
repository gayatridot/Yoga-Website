<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Zenflow Yoga</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">Zenflow Yoga</div>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">Home</a>
      <a href="trial-courses.html" class="nav-link">Trial Courses</a>
      <a href="poses.html" class="nav-link">Poses</a>
      <a href="trainers.html" class="nav-link">Professionals</a>
      <a href="login.html" class="nav-btn">Log In</a>
      <a href="signup.html" class="nav-btn signup">Sign Up</a>
    </nav>
  </header>

  <div class="login-container">
    <div class="login-box">
      <a href="index.html" class="back-link">← Back to Home</a>
      <h2>Welcome Back</h2>
      <p class="subtext">Continue your yoga practice</p>
      <form class="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>

        <button type="submit" class="login-btn">Log In</button>
      </form>
      <p class="signup-text">New here? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
